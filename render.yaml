services:
  # ---------- AI Service (FastAPI) ----------
  - type: web
    name: seed-ai-service
    runtime: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small

  # ---------- Backend (NestJS + Prisma) ----------
  - type: web
    name: seed-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: FRONTEND_URL
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          name: seed-ai-service
          type: web
          property: hostport
